name: Run Prediction Models Daily

on:
  schedule:
    # Runs every day at 9:00 AM CT (14:00 UTC)
    - cron: '0 14 * * *'

  # Also allows you to trigger it manually from GitHub's Actions tab
  workflow_dispatch:

jobs:
  run-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Check out your repo ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      # ── 4. Restore model + data caches ─────────────────────────────────────
      # Games model cache (shared by research, xgboost, random forest)
      - name: Restore games model cache
        uses: actions/cache@v4
        with:
          path: models/mlb_cache_v2
          key: mlb-cache-${{ github.run_id }}
          restore-keys: |
            mlb-cache-

      # ML hit model: box score data cache (thousands of per-game JSON files)
      # Keyed by year so the cache persists all season but rebuilds each new year
      - name: Restore ML hit data cache
        uses: actions/cache@v4
        with:
          path: hit_pred_cache
          key: hit-pred-cache-${{ env.CURRENT_YEAR }}-${{ github.run_id }}
          restore-keys: |
            hit-pred-cache-${{ env.CURRENT_YEAR }}-
        env:
          CURRENT_YEAR: ${{ steps.get-year.outputs.year }}

      - name: Get current year for cache key
        id: get-year
        run: echo "year=$(date +'%Y')" >> $GITHUB_OUTPUT

      # ── 5. Run each model (composite MUST run last) ─────────────────────────
      - name: Run Games — Log5
        run: python models/games_log5.py

      - name: Run Games — Research
        run: python models/games_research.py

      - name: Run Games — XGBoost
        run: python models/games_xgboost.py

      - name: Run Games — Random Forest
        run: python models/games_random_forest.py

      - name: Run Games — Composite
        run: python models/games_composite.py

      - name: Run Hitters — Log5 Hit
        run: python models/hitters_log5_hit.py

      - name: Run Hitters — ML Hit
        run: python models/hitters_ml_hit.py

      - name: Run Hitters — HR Model
        run: python models/hitters_hr_model.py

      # - name: Run Pitchers — Strikeout
      #   run: python models/pitchers_strikeout.py

      # ── 6. Commit updated prediction JSONs ─────────────────────────────────
      - name: Commit and push updated predictions
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "chore: update predictions $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
